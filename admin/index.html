<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Admin Dashboard</title>

  <link
    rel="stylesheet"
    href="../assets/css/variables.css"
  />

  <link
    rel="stylesheet"
    href="admin.css"
  />

</head>

<body>

  <div class="admin-light admin-light-1"></div>
  <div class="admin-light admin-light-2"></div>

  <div class="admin-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <h1>CMS</h1>

      <nav>

        <button class="nav-item active">
          Content
        </button>

        <button
            class="nav-item"
            id="cards-tab"
        >
            Cards
        </button>

        <button
            class="nav-item"
            id="sections-tab"
        >
          Sections
        </button>

        <button
  class="nav-item"
  id="media-tab"
>
  Media
</button>

      </nav>

    </aside>

    <!-- MAIN -->

    <main class="admin-main">

      <div class="topbar">

        <h2>Site Content</h2>

        <button id="logout-button">
          Logout
        </button>

      </div>

      <div id="content-list"></div>

<!-- SECTIONS PANEL -->

<div
  id="sections-panel"
  style="display: none;"
>

  <div class="panel-header">

    <h2>Sections</h2>

  </div>

  <div id="sections-list"></div>

</div>

<!-- CARDS PANEL -->
<div
  id="cards-panel"
  style="display: none;"
>

  <div class="panel-header">

    <h2>Cards</h2>

    <button id="add-card-button">
      + Add Card
    </button>

  </div>

  <div id="cards-list"></div>

</div>

    </main>

  </div>

<!-- MEDIA PANEL -->

<div
  id="media-panel"
  style="display: none;"
>

  <div class="panel-header">

    <h2>Media Manager</h2>

    <input
      type="file"
      id="media-upload"
      accept="image/*"
    />

  </div>

  <div
    id="media-grid"
    class="media-grid"
  ></div>

</div>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../assets/js/auth.js"></script>

  <script src="admin.js"></script>

</body>

</html>

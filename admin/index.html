<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="theme-color"
    content="#0f172a"
  />

  <title>Admin Dashboard</title>

  <link
    rel="stylesheet"
    href="../assets/css/variables.css"
  />

  <link
    rel="stylesheet"
    href="admin.css"
  />

</head>

<body class="dark-theme">

  <!-- AMBIENT LIGHTS -->

  <div class="admin-light admin-light-1"></div>
  <div class="admin-light admin-light-2"></div>

  <div class="admin-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="sidebar-brand">

        <h1>CMS</h1>

        <span>
          Control Center
        </span>

      </div>

      <nav>

        <button
          class="nav-item active"
          id="content-tab"
        >
          Content
        </button>

        <button
          class="nav-item"
          id="cards-tab"
        >
          Cards
        </button>

        <button
          class="nav-item"
          id="sections-tab"
        >
          Sections
        </button>

        <button
          class="nav-item"
          id="media-tab"
        >
          Media
        </button>

        <a
          href="../index.html"
          class="nav-item home-link"
        >
          ← Back To Site
        </a>

      </nav>

    </aside>

    <!-- MAIN -->

    <main class="admin-main fade-in">

      <div class="topbar">

        <h2>Site Content</h2>

        <button id="logout-button">
          Logout
        </button>

      </div>

      <!-- CONTENT PANEL -->

      <div
        id="content-panel"
      >

        <div id="content-list"></div>

      </div>

      <!-- CARDS PANEL -->

      <div
        id="cards-panel"
        style="display: none;"
      >

        <div class="panel-header">

          <h2>Cards</h2>

          <button id="add-card-button">
            + Add Card
          </button>

        </div>

        <div id="cards-list"></div>

      </div>

      <!-- SECTIONS PANEL -->

      <div
        id="sections-panel"
        style="display: none;"
      >

        <div class="panel-header">

          <h2>Sections</h2>

        </div>

        <div id="sections-list"></div>

      </div>

      <!-- MEDIA PANEL -->

      <div
        id="media-panel"
        style="display: none;"
      >

        <div class="panel-header">

          <h2>Media Manager</h2>

          <input
            type="file"
            id="media-upload"
            accept="image/*"
          />

        </div>

        <div
          id="media-grid"
          class="media-grid"
        ></div>

      </div>

    </main>

  </div>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../assets/js/auth.js"></script>

  <script src="admin.js"></script>

</body>

</html>
